---
##############################
## Docker Compose - Backend ##
##############################

services:
  db:
    image: mariadb
    restart: always
    ports:
      - 6431:3306
    environment:
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - db_mariadb_data:/var/lib/mysql

  adminer:
    image: adminer
    restart: always
    ports:
      - 6432:8080

  api:
    image: docker.io/etnauser/pli-api:latest
    restart: always
    ports:
      - 3002:3002
    environment:
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_ADDRESS: ${MARIADB_ADDRESS}
      MARIADB_PORT: ${MARIADB_PORT}
      ADMINER_PORT: ${ADMINER_PORT}
    depends_on:
      - db

volumes:
  db_mariadb_data:
    external: true
