apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pli-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Image333/Safe
    targetRevision: main
    path: v0/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: pli
  syncPolicy:
    automated:
      prune: true
      selfHeal: true