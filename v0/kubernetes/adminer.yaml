apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: pli
spec:
  replicas: 0
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: ADMINER_DEFAULT_SERVER
              value: my-mariadb
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: pli
spec:
  selector:
    app: adminer
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP